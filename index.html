<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon QR Code</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f4f9;
            font-family: sans-serif;
        }
        .container {
            text-align: center;
            padding: 20px;
        }
        img {
            width: 250px; /* Taille réduite et fixe pour le QR Code */
            height: 250px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        p {
            margin-top: 15px;
            color: #333;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="frame.png" alt="QR Code">
        <p>Scannez ce QR Code pour accéder au quiz !</p>
    </div>
</body>
</html>
